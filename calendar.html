<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h2>Futsal Admin</h2>
    <button onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <div id="bookingModal" class="modal hidden">
  <div class="modal-content">
    <h3>New Booking</h3>

    <p id="selectedSlot"></p>

    <input id="customer_name" placeholder="Nama" />

    <div class="duration">
      <button onclick="setDuration(1, this)">1 Jam</button>
<button onclick="setDuration(2, this)" class="active">2 Jam</button>
<button onclick="setDuration(3, this)">3 Jam</button>
    </div>

    <input id="amount_paid" type="number" placeholder="DP / Bayar" />

    <button onclick="submitBooking()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>
    <div class="header">
      <h2>Booking Calendar</h2>
    </div>

    <div id="calendar" class="calendar-grid"></div>
  </main>
</div>

<script type="module">
import { requireAuth, logout } from './js/auth.js'
import { getBookings, createBooking } from './js/api.js'

let selectedField = null
let selectedHour = null
let selectedDuration = 2

window.logout = logout
await requireAuth()

const fields = [
  { id: 'FIELD_ID_1', name: 'Lap 1' },
  { id: 'FIELD_ID_2', name: 'Lap 2' },
  { id: 'FIELD_ID_3', name: 'Lap 3' },
  { id: 'FIELD_ID_4', name: 'Lap 4' }
]

const today = new Date().toISOString().split('T')[0]
const bookings = await getBookings(today)

const calendar = document.getElementById('calendar')

// header row
calendar.innerHTML = `<div class="time-col"></div>` +
  fields.map(f => `<div class="col-header">${f.name}</div>`).join('')

// rows
for (let hour = 8; hour <= 22; hour++) {
  calendar.innerHTML += `<div class="time-col">${hour}:00</div>`

  fields.forEach(field => {
    const booking = bookings.find(b =>
      b.field_id === field.id &&
      hour >= b.start_time &&
      hour < b.end_time
    )

    let className = 'slot'
    if (booking) {
      className += ' ' + booking.payment_status
    }

    const slot = document.createElement('div')
    slot.className = className

if (!booking) {
  slot.onclick = () => {
    selectedField = field.id
    selectedHour = hour

    document.getElementById('customer_name').value = ''
document.getElementById('amount_paid').value = ''

selectedDuration = 2

document.querySelectorAll('.duration button')
  .forEach(btn => btn.classList.remove('active'))

document.querySelectorAll('.duration button')[1].classList.add('active')
    
    document.getElementById('selectedSlot').innerText =
      `${field.name} - ${hour}:00`

    document.getElementById('bookingModal').classList.remove('hidden')
  }
} else {
      slot.innerText = booking.payment_status
    }

    calendar.appendChild(slot)
  })
  } // end loop

// =======================
// TARUH FUNCTION DI SINI
// =======================

window.closeModal = () => {
  document.getElementById('bookingModal').classList.add('hidden')
}

window.setDuration = (d, el) => {
  selectedDuration = d

  document.querySelectorAll('.duration button')
    .forEach(btn => btn.classList.remove('active'))

  el.classList.add('active')
}

window.submitBooking = async () => {
  try {
    const amount = parseInt(document.getElementById('amount_paid').value || 0)

    await createBooking({
      p_field_id: selectedField,
      p_date: today,
      p_start: selectedHour,
      p_duration: selectedDuration,
      p_amount_paid: amount,
      p_notes: document.getElementById('customer_name').value
    })

    closeModal()
    location.reload()

  } catch (e) {
    alert(e.message)
  }
}
</script>

</body>
</html>
