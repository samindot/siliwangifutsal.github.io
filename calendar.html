<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h2>Futsal Admin</h2>
    <button onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <div class="header">
      <h2>Booking Calendar</h2>
    </div>

    <div id="calendar" class="calendar-grid"></div>
  </main>
</div>

<script type="module">
import { requireAuth, logout } from './js/auth.js'
import { getBookings, createBooking } from './js/api.js'

window.logout = logout
await requireAuth()

const fields = [
  { id: 'FIELD_ID_1', name: 'Lap 1' },
  { id: 'FIELD_ID_2', name: 'Lap 2' },
  { id: 'FIELD_ID_3', name: 'Lap 3' },
  { id: 'FIELD_ID_4', name: 'Lap 4' }
]

const today = new Date().toISOString().split('T')[0]
const bookings = await getBookings(today)

const calendar = document.getElementById('calendar')

// header row
calendar.innerHTML = `<div class="time-col"></div>` +
  fields.map(f => `<div class="col-header">${f.name}</div>`).join('')

// rows
for (let hour = 8; hour <= 22; hour++) {
  calendar.innerHTML += `<div class="time-col">${hour}:00</div>`

  fields.forEach(field => {
    const booking = bookings.find(b =>
      b.field_id === field.id &&
      hour >= b.start_time &&
      hour < b.end_time
    )

    let className = 'slot'
    if (booking) {
      className += ' ' + booking.payment_status
    }

    const slot = document.createElement('div')
    slot.className = className

    if (!booking) {
      slot.onclick = async () => {
        try {
          await createBooking({
            p_field_id: field.id,
            p_date: today,
            p_start: hour,
            p_duration: 2,
            p_amount_paid: 0
          })
          location.reload()
        } catch (e) {
          alert(e.message)
        }
      }
    } else {
      slot.innerText = booking.payment_status
    }

    calendar.appendChild(slot)
  })
}
</script>

</body>
</html>
